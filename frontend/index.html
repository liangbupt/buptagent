<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>北邮校园智能生活助手</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-layer bg-grid"></div>
    <div class="bg-layer bg-glow"></div>

    <div class="app-shell">
        <aside class="context-panel">
            <p class="panel-kicker">BUPT CAMPUS AGENT</p>
            <h1>北邮校园智能生活助手</h1>
            <p class="panel-desc">教务、食堂、空教室、校园交易一站式对话入口。支持复合任务拆解与多轮记忆上下文。</p>

            <div class="capability-list">
                <span class="capability">多 Agent 协作</span>
                <span class="capability">记忆增强问答</span>
                <span class="capability">MCP 工具路由</span>
                <span class="capability">复合指令处理</span>
            </div>

            <div class="api-key-panel">
                <p class="api-key-title">你的 OpenAI API Key</p>
                <div class="api-key-row">
                    <input type="password" id="apiKeyInput" placeholder="sk-..." autocomplete="off">
                    <button type="button" id="saveKeyBtn">保存</button>
                </div>
                <p class="api-key-hint" id="keyHint">仅保存在当前浏览器，不会写入仓库文件。</p>
            </div>

            <div class="quick-prompts">
                <p>试试这些问题</p>
                <button type="button" class="quick-btn" data-prompt="我在教三，接下来两小时有空闲教室吗？">教三附近空闲教室</button>
                <button type="button" class="quick-btn" data-prompt="中午推荐一个清淡且预算30以内的食堂窗口">30元内清淡食堂推荐</button>
                <button type="button" class="quick-btn" data-prompt="我想蹭一节 AI 相关课程，有没有合适的课？">AI 方向可蹭课程</button>
            </div>
        </aside>

        <section class="chat-panel">
            <header class="chat-header">
                <div>
                    <p class="chat-title">Campus Console</p>
                    <p class="chat-subtitle">实时会话 · 记忆状态已启用</p>
                </div>
                <span class="status-pill">在线</span>
            </header>

            <main class="chat-container" id="chatContainer">
                <div class="message system-msg">
                    <div class="avatar">AI</div>
                    <div class="bubble glass-effect">
                        同学你好，我已准备好处理你的校园任务。你可以一次说多个目标，例如“查空教室 + 推荐午饭 + 课程建议”。
                    </div>
                </div>
            </main>

            <footer class="input-area glass-effect">
                <input type="text" id="userInput" placeholder="例如：我在教一，帮我找空教室并推荐附近不辣午饭" autocomplete="off">
                <button id="sendBtn" class="send-btn" aria-label="发送消息">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </footer>
        </section>
    </div>
    <script src="app.js"></script>
</body>
</html>
